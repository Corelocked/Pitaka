<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pitaka-logo.png" sizes="32x32" />

    <meta name="author" content="Pitaka" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap"
    />

    <link rel="apple-touch-icon" href="/pitaka-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="Pitaka Blog RSS" href="/rss.xml" />
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Pitaka",
      "description": "Personal finance and budget tracking application for managing expenses, income, investments, and financial planning",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web, Android, iOS",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      }
    }
    </script>
    <!-- Pricing Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Pitaka Pro",
      "description": "Premium features for advanced personal finance management",
      "brand": {
        "@type": "Brand",
        "name": "Pitaka"
      },
      "offers": [
        {
          "@type": "Offer",
          "priceCurrency": "USD",
          "price": "0",
          "priceValidUntil": "2026-12-31",
          "availability": "https://schema.org/InStock",
          "name": "Basic - Free"
        },
        {
          "@type": "Offer",
          "priceCurrency": "USD",
          "price": "9.99",
          "priceValidUntil": "2026-12-31",
          "availability": "https://schema.org/InStock",
          "name": "Pitaka Pro - Monthly",
          "billingDuration": "P1M"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      }
    }
    </script>
    <!-- FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Pitaka free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Pitaka is completely free with all core features included."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your data is encrypted and stored securely. Only you can access your information."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Pitaka on mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use Pitaka on web, iOS, or Android with full synchronization."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export my data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, export all your data to CSV and Excel formats anytime."
          }
        }
      ]
    }
    </script>
    <title>Pitaka - Personal Finance & Budget Tracker App</title>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
